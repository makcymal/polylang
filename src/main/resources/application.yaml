app:
  version: '@project.version@'

server:
  port: ${SERVER_PORT}

spring:
  main:
    banner-mode: off
  application:
    name: polylang
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${POSTGRES_URL}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    open-in-view: false
    properties:
      hibernate:
        show-sql: ${JPA_SHOW_SQL}
        format-sql: true
        hbm2ddl:
          auto: validate
  liquibase:
    enabled: true
    liquibase-schema: public
    database-change-log-table: changelog
    database-change-log-lock-table: changelog_lock
    change-log: classpath:/db/changelog.yaml

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED}

security:
  public-key: ${PUBLIC_KEY}
  private-key: ${PRIVATE_KEY}
  access-token-validity: ${ACCESS_TOKEN_VALIDITY}
  refresh-token-validity: ${REFRESH_TOKEN_VALIDITY}
  email-confirmation-code-validity: ${EMAIL_CONFIRMATION_CODE_VALIDITY}
  cookies-attr-secure: ${COOKIES_ATTR_SECURE}
  cookies-attr-same-site: ${COOKIES_ATTR_SAME_SITE}

talks:
  cleanup-rate: ${TALKS_CLEANUP_RATE}
  records-dir: ${RECORDS_DIR}
  transcriptions-dir: ${TRANSCRIPTIONS_DIR}
  whisper-path: ${WHISPER_PATH}
  whisper-model: ${WHISPER_MODEL}
  whisper-models-dir: ${WHISPER_MODELS_DIR}
  whisper-response-timeout: ${WHISPER_RESPONSE_TIMEOUT}
  transcribing-thread-pool-size: ${TRANSCRIBING_THREAD_POOL_SIZE}
  transcription-processing-thread-pool-size: ${TRANSCRIPTION_PROCESSING_THREAD_POOL_SIZE}
  transcribing-period: ${TRANSCRIBING_PERIOD}
  detect-silence-by-no-speech-prob-threshold: ${DETECT_SILENCE_BY_NO_SPEECH_PROB_THRESHOLD}
  silence-timeout-to-stop-recording: ${SILENCE_TIMEOUT_TO_STOP_RECORDING}
