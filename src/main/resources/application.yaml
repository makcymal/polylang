app:
  version: '@project.version@'

server:
  port: ${SERVER_PORT}

spring:
  main:
    banner-mode: off
  application:
    name: polylang
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${POSTGRES_URL}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        show-sql: ${JPA_SHOW_SQL}
        format-sql: true
        hbm2ddl:
          auto: validate
  liquibase:
    enabled: true
    liquibase-schema: public
    database-change-log-table: changelog
    database-change-log-lock-table: changelog_lock
    change-log: classpath:/db/changelog.yaml

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED}

jwt:
  public-key: ${PUBLIC_KEY}
  private-key: ${REFRESH_KEY}
  access-token-validity: ${ACCESS_TOKEN_VALIDITY}
  refresh-token-validity: ${REFRESH_TOKEN_VALIDITY}

speaking:
  speech-records-dir: ${SPEECH_RECORDS_DIR}
  speech-transcriptions-dir: ${SPEECH_TRANSCRIPTIONS_DIR}
  transcribe-by-snippets-of-duration: ${TRANSCRIBE_BY_SNIPPETS_OF_DURATION}
  whisper-path: ${WHISPER_PATH}
  whisper-model: ${WHISPER_MODEL}
  whisper-models-dir: ${WHISPER_MODELS_DIR}
