server:
  port: 3232

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/polylang
    username: postgres
    password: postgres
  jpa:
    properties:
      hibernate:
        show-sql: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

jwt:
  public-key: 
  private-key: 
  access-token-validity: PT10M
  refresh-token-validity: PT24H

speaking:
  speech-records-dir: /app/speech-records
  speech-transcriptions-dir: /app/speech-transcriptions
  transcribe-by-snippets-of-duration: PT15S
  whisper-path: /app/whisper-venv/bin/whisper
  whisper-model: SMALL_EN
  whisper-models-dir: /app/whisper-models
  whisper-thread-pool-size: 4
  waiting-whisper-response-timeout: PT1M
  detect-silence-by-no-speech-prob-threshold: '0.8'
  silence-timeout-to-stop-recording: PT10S
